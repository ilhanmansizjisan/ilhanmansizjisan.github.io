<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="মৌসুমি ফসলের ক্যালেন্ডার — বাংলাদেশে মাসভিত্তিক বুনুন, বড় হওয়া ও তোলার গাইড। ইলহান মানসিজ জিসানের প্রকল্প।" />
  <meta name="theme-color" content="#0a181b" />
  <title>মৌসুমি ফসলের ক্যালেন্ডার · ইলহান মানসিজ জিসান</title>
  <link rel="icon" href="../../assets/favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="calendar.css" />
</head>
<body>
  <div class="bg-glow"></div>

  <a class="back-link" href="../../">← হোমে ফিরুন</a>

  <main class="cl-stage">
    <header class="cl-head">
      <p class="eyebrow">[ প্রকল্প ]</p>
      <h1>মৌসুমি ফসলের ক্যালেন্ডার</h1>
      <p class="lead">
        বাংলাদেশের জন্য মাসভিত্তিক গাইড: কোন মাসে কী <span class="tag sow">বুনবেন</span>,
        কী <span class="tag grow">বড় হচ্ছে</span> আর কী <span class="tag harvest">তুলবেন</span>।
        ফসলের ধরন অনুযায়ী ছেঁকে নিন।
      </p>
    </header>

    <section class="cl-filters" id="filters"></section>

    <section class="cl-months" id="months"></section>

    <p class="cl-foot">মধ্য বাংলাদেশের (টাঙ্গাইল/ঢাকা অঞ্চল) সূচনামূলক গাইড · ইলহান মানসিজ জিসান</p>
  </main>

  <script src="calendar.js" defer></script>
</body>
</html>
